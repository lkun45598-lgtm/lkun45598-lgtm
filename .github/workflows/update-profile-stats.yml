name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3,15 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile-stats.yml"
      - "scripts/update_github_stats.py"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate GitHub stats card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_LOGIN: lkun45598-lgtm
        run: python scripts/update_github_stats.py

      - name: Commit updated stats
        run: |
          if git diff --quiet -- README.md assets/github-stats.json; then
            echo "No stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/github-stats.json
          git commit -m "Update profile GitHub stats"
          git push
