name: Generate Stats Cards

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: lkun45598-lgtm
        run: |
          mkdir -p stats

          fetch() {
            local output="$1"; shift
            for url in "$@"; do
              echo "Trying: $url"
              if curl -sSL --max-time 30 -o "$output" "$url"; then
                if head -5 "$output" | grep -q '<svg'; then
                  echo "  -> OK"
                  return 0
                fi
              fi
              echo "  -> Failed, trying next..."
            done
            echo "  -> All mirrors failed for $output"
            return 1
          }

          # GitHub Stats + Languages cards (self-hosted, includes private + collab repos)
          python3 scripts/generate_stats_card.py

          # Activity Graph
          fetch stats/activity-graph.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=${USERNAME}&bg_color=0d1117&color=0891b2&line=06b6d4&point=0891b2&area_color=0891b2&area=true&hide_border=true&custom_title=Contribution%20Graph" \
            || true

          # Trophy - self-generated, no external dependency
          OUTPUT=stats/trophy.svg python3 scripts/generate_trophy.py

          # Post-process: remove CSS animations that cause opacity:0 on GitHub
          for svg in stats/github-stats.svg stats/languages.svg; do
            if [ -f "$svg" ]; then
              sed -i 's/opacity: 0;/opacity: 1;/g' "$svg"
              echo "Fixed opacity in $svg"
            fi
          done

          # Star History chart (white/default theme)
          fetch stats/star-history.svg \
            "https://api.star-history.com/svg?repos=lkun45598-lgtm/RL_for_Agent,lkun45598-lgtm/SST_FTM,lkun45598-lgtm/Ifactformer-Earthquake-Prediction&type=Date" \
            || true

          echo "=== Generated files ==="
          ls -la stats/

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stats/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update stats cards" && git pull --rebase && git push)


