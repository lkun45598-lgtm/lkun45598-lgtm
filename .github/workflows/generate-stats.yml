name: Generate Stats Cards

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: lkun45598-lgtm
        run: |
          mkdir -p stats

          fetch() {
            local output="$1"; shift
            for url in "$@"; do
              echo "Trying: $url"
              if curl -sS --max-time 30 -o "$output" "$url"; then
                if head -5 "$output" | grep -q '<svg'; then
                  echo "  -> OK"
                  return 0
                fi
              fi
              echo "  -> Failed, trying next..."
            done
            echo "  -> All mirrors failed for $output"
            return 1
          }

          # GitHub Stats card
          fetch stats/github-stats.svg \
            "https://github-readme-stats-eight-theta.vercel.app/api?username=${USERNAME}&show_icons=true&theme=transparent&include_all_commits=true&hide_border=true&title_color=0891b2&icon_color=06b6d4&text_color=ffffff&bg_color=00000000&ring_color=0891b2" \
            "https://github-readme-stats.vercel.app/api?username=${USERNAME}&show_icons=true&theme=transparent&include_all_commits=true&hide_border=true&title_color=0891b2&icon_color=06b6d4&text_color=ffffff&bg_color=00000000&ring_color=0891b2" \
            || true

          # Top Languages card
          fetch stats/languages.svg \
            "https://github-readme-stats-eight-theta.vercel.app/api/top-langs/?username=${USERNAME}&theme=transparent&layout=compact&hide_border=true&hide=jupyter%20notebook&title_color=0891b2&text_color=ffffff&bg_color=00000000" \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=${USERNAME}&theme=transparent&layout=compact&hide_border=true&hide=jupyter%20notebook&title_color=0891b2&text_color=ffffff&bg_color=00000000" \
            || true

          # Activity Graph
          fetch stats/activity-graph.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=${USERNAME}&theme=react-dark&hide_border=true&line=0891b2&point=06b6d4&color=0891b2" \
            || true

          # Trophy - self-generated, no external dependency
          OUTPUT=stats/trophy.svg python3 scripts/generate_trophy.py

          echo "=== Generated files ==="
          ls -la stats/

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stats/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update stats cards" && git pull --rebase && git push)
