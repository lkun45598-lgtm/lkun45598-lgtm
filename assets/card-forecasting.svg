      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="536" height="166" rx="28" fill="url(#bg)"/>
  <rect x="12" y="12" width="536" height="166" rx="28" stroke="#D8E2EC"/>

