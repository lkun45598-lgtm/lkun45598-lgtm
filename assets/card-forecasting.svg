<svg width="560" height="190" viewBox="0 0 560 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ifactformer Earthquake Prediction card</title>
  <desc id="desc">A profile card describing the forecasting layer for wavefield prediction.</desc>

  <defs>
    <linearGradient id="bg" x1="16" y1="16" x2="544" y2="174" gradientUnits="userSpaceOnUse">
