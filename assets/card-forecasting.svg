  <text x="44" y="98" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700">04</text>
  <text x="44" y="122" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">PHYSICAL</text>
  <text x="44" y="137" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">FORECAST</text>

