  <text x="178" y="144" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Stable rollout for long-range physical prediction in spatiotemporal</text>
  <text x="178" y="160" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">systems with staged training and autoregressive forecasting.</text>

