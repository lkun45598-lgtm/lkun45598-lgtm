  <text x="178" y="154" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Multi-provider service for ocean preprocessing, orchestration,</text>
  <text x="178" y="170" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">and inspectable execution around long-running scientific jobs.</text>

