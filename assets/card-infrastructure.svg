  <text x="178" y="60" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Private Ocean Agent</text>
  <text x="178" y="86" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Infrastructure</text>
  <text x="178" y="108" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">private service for scientific execution control</text>

  <rect x="178" y="120" width="86" height="20" rx="10" fill="#EDF2FB"/>
  <rect x="272" y="120" width="88" height="20" rx="10" fill="#EEF6F3"/>
