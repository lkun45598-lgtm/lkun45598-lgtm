<svg width="560" height="190" viewBox="0 0 560 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Private Ocean Agent Infrastructure card</title>
  <desc id="desc">A profile card describing a private ocean agent infrastructure project for AI for Science.</desc>

  <defs>
    <linearGradient id="bg" x1="16" y1="16" x2="544" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFAF7"/>
      <stop offset="1" stop-color="#F3F7F4"/>
    </linearGradient>
    <linearGradient id="accent" x1="404" y1="128" x2="514" y2="82" gradientUnits="userSpaceOnUse">
