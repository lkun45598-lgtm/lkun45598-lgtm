<svg width="560" height="240" viewBox="0 0 560 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RL_for_Agent card</title>
  <desc id="desc">A featured project card for RL_for_Agent and its paper to code experimentation loop.</desc>

  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="534" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FCFB"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="84" y1="88" x2="454" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="540" height="220" rx="24" fill="url(#bg)"/>
  <rect x="10" y="10" width="540" height="220" rx="24" stroke="#D7E3EE"/>

  <text x="36" y="48" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2">FEATURED 01</text>
  <text x="36" y="84" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">RL_for_Agent</text>
  <text x="36" y="113" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">An agent service for paper reading, code editing, tool use, and iterative experimentation.</text>

  <rect x="36" y="134" width="152" height="30" rx="15" fill="#D1FAE5"/>
  <text x="57" y="154" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">Track: Agents</text>

  <rect x="36" y="178" width="96" height="26" rx="13" fill="#DBEAFE"/>
  <rect x="142" y="178" width="82" height="26" rx="13" fill="#E0F2FE"/>
  <rect x="234" y="178" width="96" height="26" rx="13" fill="#EDE9FE"/>
  <rect x="340" y="178" width="82" height="26" rx="13" fill="#FFEDD5"/>
  <text x="58" y="196" fill="#1D4ED8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">REST</text>
  <text x="170" y="196" fill="#0369A1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">SSE</text>
  <text x="256" y="196" fill="#6D28D9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">Sandbox</text>
  <text x="359" y="196" fill="#C2410C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">KODE SDK</text>

  <path d="M344 141H505" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="366" cy="141" r="7" fill="#0F766E"/>
  <circle cx="421" cy="141" r="7" fill="#2563EB"/>
  <circle cx="476" cy="141" r="7" fill="#0F766E"/>
  <text x="350" y="171" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">task</text>
  <text x="408" y="171" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">tools</text>
  <text x="458" y="171" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">learn</text>
</svg>
