<svg width="1120" height="220" viewBox="0 0 1120 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile map card</title>
  <desc id="desc">A card showing the overall map of the profile from foundations to agents.</desc>

  <defs>
    <linearGradient id="bg" x1="20" y1="18" x2="1096" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F5EE"/>
      <stop offset="0.54" stop-color="#EEF7F7"/>
      <stop offset="1" stop-color="#EEF1FF"/>
    </linearGradient>
    <linearGradient id="line" x1="92" y1="160" x2="1020" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="1100" height="200" rx="24" fill="url(#bg)"/>
  <rect x="10" y="10" width="1100" height="200" rx="24" stroke="#D7E3EE"/>

  <text x="36" y="48" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2">CARD 03</text>
  <text x="36" y="82" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Profile Map</text>
  <text x="36" y="110" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Foundations -> Systems -> Scientific ML -> Agent Workflows</text>

  <path d="M92 155H1024" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="164" cy="155" r="9" fill="#2563EB"/>
  <circle cx="402" cy="155" r="9" fill="#0F766E"/>
  <circle cx="680" cy="155" r="9" fill="#EA580C"/>
  <circle cx="932" cy="155" r="9" fill="#7C3AED"/>

  <text x="116" y="140" fill="#1D4ED8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Foundations</text>
  <text x="116" y="181" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Numerical Analysis</text>

  <text x="340" y="140" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Systems</text>
  <text x="340" y="181" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">C / Python / TypeScript</text>

  <text x="606" y="140" fill="#C2410C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Scientific ML</text>
  <text x="606" y="181" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">SST / wavefields / priors</text>

  <text x="860" y="140" fill="#6D28D9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Agents</text>
  <text x="860" y="181" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">paper / code / experiments</text>
</svg>
