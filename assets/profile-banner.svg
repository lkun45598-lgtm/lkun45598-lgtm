<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">lkun profile banner</title>
  <desc id="desc">A calm profile banner showing lkun and a subtle AI-for-Science pipeline from agents to modeling.</desc>

  <defs>
    <linearGradient id="bg" x1="24" y1="18" x2="1256" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F3"/>
      <stop offset="0.5" stop-color="#F3FAF8"/>
      <stop offset="1" stop-color="#F2F6FF"/>
    </linearGradient>
    <linearGradient id="accentA" x1="92" y1="70" x2="492" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentB" x1="748" y1="100" x2="1134" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA580C"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-10" y="-10" width="1300" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="1240" height="180" rx="28" fill="url(#bg)"/>
    <rect x="20" y="20" width="1240" height="180" rx="28" stroke="#D8E2EC"/>
  </g>

