  <text x="178" y="154" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">Recovers sparse or corrupted geophysical fields with priors</text>
  <text x="178" y="170" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">and operator-style learning for structured reconstruction.</text>

